<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a160a;color:#e8f5e9;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}

.card{background:#162916;border:1px solid #2d4a2d;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.card-gold{border-color:#f5e642}

.badge-tier-long{background:#374151;color:#9ca3af}

.bar{height:100%;border-radius:4px}
.stat-grid{display:grid;gap:8px}
.stat-box{background:#0a160a;border-radius:8px;padding:8px 10px;text-align:center}

.stat-lbl{font-size:9px;color:#6a9a6a;text-transform:uppercase}

.sort-btn.active{background:#2d6a2d;color:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}

td{padding:6px 6px;border-bottom:1px solid #1a2e1a}
tr:hover td{background:#162916}
.under{color:#f87171;font-weight:700}
.over{color:#86efac;font-weight:700}
.even{color:#e8f5e9}
.pos{color:#6a9a6a;font-size:11px}
.refresh-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.btn{padding:6px 16px;border-radius:20px;border:1px solid #2d6a2d;cursor:pointer;background:#2d6a2d;color:#fff;font-size:11px;font-weight:700;font-family:inherit}
.btn-outline{background:transparent;color:#8fbc8f}
.btn-active{background:#78350f;border-color:#f5e642;color:#f5e642}
.info-box{background:#162916;border:1px solid #2d6a2d;border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;color:#8fbc8f}

}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n === null || n === undefined) return '-';
  if (n === 0) return 'E';
  return n > 0 ? '+' + n : String(n);
}
function scoreClass(n) {
  if (n === null || n === undefined) return '';
  if (n < 0) return 'under';
  if (n > 0) return 'over';
  return 'even';
}
function parseSc(s) {
  if (!s || s === '-' || s === '') return null;
  if (s === 'E') return 0;
  const n = parseInt(s);
  return isNaN(n) ? null : n;
}
function tierBadge(w) {
  if (w >= 15) return '<span class="badge badge-tier-elite">Elite</span>';
  if (w >= 8)  return '<span class="badge badge-tier-top">Top</span>';
  if (w >= 4)  return '<span class="badge badge-tier-strong">Strong</span>';
  if (w >= 2)  return '<span class="badge badge-tier-value">Value</span>';
  if (w >= 1)  return '<span class="badge badge-tier-sleeper">Sleeper</span>';
  return '<span class="badge badge-tier-long">Long</span>';
}
function dollar(n) { return '$' + Math.round(n).toLocaleString(); }

  document.querySelectorAll('.tab-btn').forEach(function(b) {

// ── FETCH SCORES ──────────────────────────────────────────────────────────────
async function fetchScores() {
  var btn = document.getElementById('refresh-btn');
  if (btn) { btn.textContent = 'Loading...'; btn.disabled = true; }

  // ESPN blocks direct browser requests (CORS). Route through a free CORS proxy.
  var espnUrl = 'https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard?event=401811941';
  var proxyUrls = [
    'https://corsproxy.io/?' + encodeURIComponent(espnUrl),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(espnUrl),
    'https://thingproxy.freeboard.io/fetch/' + espnUrl,
  ];

  var data = null;
  for (var p = 0; p < proxyUrls.length; p++) {
    try {
      console.log('Trying proxy:', proxyUrls[p].split('?')[0]);
      var res = await fetch(proxyUrls[p]);
      if (!res.ok) { console.log('HTTP', res.status); continue; }
      var json = await res.json();
      var comps = json && json.events && json.events[0] &&
                  json.events[0].competitions && json.events[0].competitions[0] &&
                  json.events[0].competitions[0].competitors;
      if (comps && comps.length > 0) {
        data = json;
        console.log('Got data via proxy', p, '- players:', comps.length);
        break;
      } else {
        console.log('Proxy', p, 'returned no competitors');
      }
    } catch(e) {
      console.log('Proxy', p, 'failed:', e.message);
    }
  }

  if (data) {
    var comps = data.events[0].competitions[0].competitors;
    leaderboard = comps.map(function(c) {
      var rounds = (c.linescores || []).map(function(r) { return parseSc(r.displayValue); });
      var totalRaw = (c.score && c.score.displayValue) ? c.score.displayValue : null;
      return {
        name: (c.athlete && (c.athlete.displayName || c.athlete.fullName)) || '',
        pos:  (c.status && c.status.position && c.status.position.displayName) || '',
        thru: (c.status && c.status.thru) || '',
        total: parseSc(totalRaw),
        rounds: rounds,
      };
    }).filter(function(p) { return p.name; })
      .sort(function(a, b) {
        if (a.total === null && b.total === null) return 0;
        if (a.total === null) return 1;
        if (b.total === null) return -1;
        return a.total - b.total;
      });
    lastUpdated = new Date();
  } else {
    console.log('All proxies failed - no live data available');
  }
  render();
}
function toggleAuto() {
  autoRefresh = !autoRefresh;
  if (autoRefresh) {
    autoTimer = setInterval(fetchScores, 60000);
  } else {
    clearInterval(autoTimer);
  }
  render();
}

// ── BUILD GROUP SCORES ────────────────────────────────────────────────────────
function getGroupScores() {
  const scores = {};
  GROUPS.forEach(g => scores[g.name] = { ...g, players: [], bestTotal: null, bestPos: null });
  leaderboard.forEach((p, idx) => {
    const grp = PLAYER_TO_GROUP[p.name];
    if (!grp || !scores[grp]) return;
    scores[grp].players.push({ ...p, rank: idx + 1 });
    if (scores[grp].bestTotal === null || (p.total !== null && p.total < scores[grp].bestTotal)) {
      scores[grp].bestTotal = p.total;
      scores[grp].bestPos = idx + 1;
    }
  });
  return Object.values(scores);
}

function getOwnerScores(groupScores) {
  const owners = {};
  groupScores.forEach(g => {
    const o = g.owner || 'Unassigned';
    if (!owners[o]) owners[o] = { owner: o, groups: [], bestTotal: null, bestPos: null, spent: 0 };
    owners[o].groups.push(g);
    owners[o].spent += g.sold;
    if (g.bestTotal !== null && (owners[o].bestTotal === null || g.bestTotal < owners[o].bestTotal)) {
      owners[o].bestTotal = g.bestTotal;
      owners[o].bestPos = g.bestPos;
    }
  });
  return Object.values(owners).sort((a,b) => {
    if (a.bestTotal === null && b.bestTotal === null) return 0;
    if (a.bestTotal === null) return 1;
    if (b.bestTotal === null) return -1;
    return a.bestTotal - b.bestTotal;
  });
}

  sorted.forEach(g => {
    const roiPos = g.roi >= 0;
    const roiNear = g.roi >= -25;
    const roiColor = roiPos ? '#4ade80' : roiNear ? '#f5e642' : '#f87171';
    const pct = Math.min(100, (g.ev / g.sold) * 100);
    html += `<div class="card" style="border-color:${roiPos?'#2d6a2d':'#2d4a2d'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <b style="font-size:15px">${g.name}</b>
          ${tierBadge(g.winProb)}
          <span class="badge badge-owner">${g.owner}</span>
          <div style="font-size:10px;color:#6a9a6a;margin-top:2px">Paid: ${dollar(g.sold)} &bull; EV: ${dollar(g.ev)} &bull; Win: ${g.winProb}%</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:900;color:${roiColor}">${g.roi>0?'+':''}${g.roi}%</div>
          <div style="font-size:9px;color:#6a9a6a">expected ROI</div>
        </div>
      </div>
      <div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${roiColor}"></div></div>
      <div style="font-size:10px;color:#6a9a6a;margin-top:3px">
        ${dollar(g.ev)} expected &bull; ${dollar(g.ev-g.sold)} P&amp;L &bull; ${Math.round(pct)}c per $1
      </div>
    </div>`;
  });
  return html;
}

function renderPayouts() {
  let html = `<div class="card card-gold" style="margin-bottom:16px">
    <h3 style="color:#f5e642;font-size:14px;font-weight:700;margin-bottom:12px">PAYOUT STRUCTURE &mdash; Total Pot: $57,400</h3>
    <div class="stat-grid" style="grid-template-columns:1fr 1fr">`;
  const items = [
    ['1st Place (20%)', D.p1],['2nd Place (15%)', D.p2],['3rd Place (10%)', D.p3],
    ['4th Place (8%)', D.p4],['5th Place (7%)', D.p5],['6th Place (6%)', D.p6],
    ['7th Place (5%)', D.p7],['8th Place (4%)', D.p8],
    ['Daily Low Round x4 (3%/day)', D.dailyLow],
    ['R2 Leader (3%)', D.r2leader],['R3 Leader (3%)', D.r3leader],
    ['Low Round of Tourney (2%)', D.lowRound],
    ['Holes in One (3%)', D.hio],['Par 3 Contest Winner (2%)', D.par3],
  ];
  items.forEach(([label, val]) => {
    html += `<div style="display:flex;justify-content:space-between;background:#0a160a;border-radius:6px;padding:5px 9px;font-size:11px">
      <span style="color:#8fbc8f">${label}</span>
      <span style="color:#f5e642;font-weight:700">${dollar(val)}</span>
    </div>`;
  });
  html += `</div></div>`;

  // ROI table
  const sorted = [...GROUPS].sort((a,b) => b.roi - a.roi);
  html += '<div class="card" style="margin-bottom:16px;border-color:#4ade80"><h3 style="color:#4ade80;font-size:13px;font-weight:700;margin-bottom:10px">&#10003; ROUND 1 CONFIRMED PAYOUTS</h3><div style="display:grid;gap:6px"><div style="display:flex;justify-content:space-between;background:#0a160a;border-radius:6px;padding:6px 10px;font-size:12px"><span style="color:#8fbc8f">R1 Daily Low (tied) &mdash; <b style="color:#f5e642">Rory+</b> (McIlroy -5) &amp; <b style="color:#f5e642">Sam I Cam</b> (Burns -5)</span><span style="color:#4ade80;font-weight:700">$861 each</span></div></div><div style="font-size:11px;color:#6a9a6a;margin-top:8px">R1 Final: McIlroy &amp; Burns (-5) &bull; T3: Kitayama, Day, Reed (-3) &bull; T6: Scheffler, Schauffele, Rose, Lowry (-2) &bull; Bryson +4 (76)</div></div>';
  html += `<h3 style="color:#f5e642;font-size:13px;font-weight:700;margin-bottom:10px">Expected ROI by Group</h3>
    <div style="overflow-x:auto"><table>
    <thead><tr><th>Group</th><th>Owner</th><th style="text-align:right">Paid</th><th style="text-align:right">Exp. Value</th><th style="text-align:right">P&amp;L</th><th style="text-align:right">ROI</th></tr></thead>
    <tbody>`;
  sorted.forEach(g => {
    const roiPos = g.roi >= 0, roiNear = g.roi >= -25;
    const roiColor = roiPos ? '#4ade80' : roiNear ? '#f5e642' : '#f87171';
    html += `<tr>
      <td><b>${g.name}</b></td>
      <td style="color:#60a5fa;font-size:11px">${g.owner}</td>
      <td style="text-align:right;color:#f87171">${dollar(g.sold)}</td>
      <td style="text-align:right;color:#60a5fa">${dollar(g.ev)}</td>
      <td style="text-align:right;color:${roiColor}">${g.ev >= g.sold ? '+' : ''}${dollar(g.ev-g.sold)}</td>
      <td style="text-align:right;font-weight:700;color:${roiColor}">${g.roi > 0 ? '+' : ''}${g.roi}%</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}


function renderDetail() {
  // Group selector pills
  let html = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">';
  GROUPS.forEach(function(g) {
    var active = selectedGroup === g.name;
    html += '<button class="sort-btn ' + (active ? 'active' : '') + '" data-detail="' + g.name + '">' + g.name + '</button>';
  });
  html += '</div>';

  if (!selectedGroup) {
    html += '<div style="text-align:center;padding:40px;color:#4a7a4a;font-size:14px">Select a group above to see player details</div>';
    return html;
  }

  var g = GROUP_MAP[selectedGroup];
  var members = GROUP_MEMBERS[selectedGroup] || [];
  var liveScores = {};
  leaderboard.forEach(function(p) { liveScores[p.name] = p; });

  html += '<div class="card card-gold" style="margin-bottom:12px">';
  html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">';
  html += '<div>';
  html += '<h2 style="font-size:20px;color:#f5e642">' + g.name + '</h2>';
  html += '<div style="font-size:12px;color:#60a5fa;margin-top:2px">' + g.owner + '</div>';
  html += '<div style="font-size:11px;color:#6a9a6a;margin-top:2px">' + members.length + ' players</div>';
  html += '</div>';
  html += '<div style="text-align:right">';
  html += '<div style="font-size:28px;font-weight:900;color:#f87171">$' + g.sold.toLocaleString() + '</div>';
  html += '<div style="font-size:9px;color:#6a9a6a;text-transform:uppercase">Sold Price</div>';
  html += '</div></div>';

  // Stats row
  html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">';
  [['Win%', g.winProb + '%', '#4ade80'], ['R1 Lead', g.r1 + '%', '#c084fc'],
   ['R2 Lead', g.r2 + '%', '#60a5fa'], ['R3 Lead', g.r3 + '%', '#fb923c']].forEach(function(s) {
    html += '<div class="stat-box"><div class="stat-val" style="color:' + s[2] + '">' + s[1] + '</div><div class="stat-lbl">' + s[0] + '</div></div>';
  });
  html += '</div></div>';

  // Player cards
  html += '<h3 style="color:#6a9a6a;font-size:11px;font-weight:700;margin:0 0 8px;text-transform:uppercase;letter-spacing:0.5px">Players</h3>';
  members.forEach(function(name, i) {
    var p = PLAYERS[name] || { odds: null, notes: '' };
    var live = liveScores[name];
    html += '<div class="card" style="margin-bottom:6px">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
    html += '<div>';
    html += '<span style="font-weight:700;font-size:13px;color:' + (i===0?'#f5e642':'#e8f5e9') + '">' + name + '</span>';
    if (p.odds) html += '<span style="font-size:11px;color:#f5e642;margin-left:8px">+' + p.odds.toLocaleString() + '</span>';
    html += '</div>';
    if (live) {
      html += '<div style="display:flex;gap:12px;font-size:11px">';
      [0,1,2,3].forEach(function(r) {
        html += '<span class="' + scoreClass(live.rounds[r]) + '">' + fmt(live.rounds[r]) + '</span>';
      });
      html += '<span class="' + scoreClass(live.total) + '" style="font-weight:800;font-size:13px;margin-left:4px">' + fmt(live.total) + '</span>';
      html += '</div>';
    }
    html += '</div>';
    if (p.notes) html += '<div style="font-size:11px;color:#6a9a6a;font-style:italic">' + p.notes + '</div>';
    html += '</div>';
  });
  return html;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('content');
  if (currentTab === 'leaderboard') el.innerHTML = renderLeaderboard();
  else if (currentTab === 'groups')  el.innerHTML = renderGroups();
  else if (currentTab === 'owners')  el.innerHTML = renderOwners();
  else if (currentTab === 'auction') el.innerHTML = renderAuction();
  else if (currentTab === 'payouts') el.innerHTML = renderPayouts();
  else if (currentTab === 'detail')  el.innerHTML = renderDetail();
};

// ── INIT + EVENT DELEGATION ──────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  var t = e.target;
  // Tab navigation
  if (t.hasAttribute('data-tab')) {
    showTab(t.getAttribute('data-tab'));
    return;
  }
  // Group detail selector
  if (t.hasAttribute('data-detail')) {
    selectedGroup = t.getAttribute('data-detail');
    render();
    return;
  }
  // Sort buttons
  if (t.hasAttribute('data-sort')) {
    var stype = t.getAttribute('data-type');
    var sval = t.getAttribute('data-sort');
    if (stype === 'auction') { auctionSort = sval; render(); }
    if (stype === 'group')   { groupSort = sval;   render(); }
    return;
  }
  // Refresh / auto buttons
  if (t.id === 'refresh-btn' || t.id === 'refresh-btn-inner') { fetchScores(); return; }
  if (t.id === 'auto-btn-inner') { toggleAuto(); return; }
});

render();
fetchScores();
</script>
</body>
</html>
