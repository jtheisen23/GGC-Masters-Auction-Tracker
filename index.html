const POOL_MULTIPLIER = 320;

function calcGroup(members) {
  let winProb = 0, r1 = 0, r2 = 0, r3 = 0;
  const playerList = members.map(m => ({ name: m, ...(playerData[m] || { odds: 999999, winProb: 0, r1: 0, r2: 0, r3: 0, notes: "" }) }));
  playerList.forEach(p => { winProb += p.winProb; r1 += p.r1; r2 += p.r2; r3 += p.r3; });
  playerList.sort((a, b) => b.winProb - a.winProb);
  const value = Math.max(50, Math.round((winProb * POOL_MULTIPLIER + r1 * 12)));
  return {
    winProb: Math.round(winProb * 10) / 10,
    r1: Math.round(r1 * 10) / 10,
    r2: Math.round(r2 * 10) / 10,
    r3: Math.round(r3 * 10) / 10,
    value,
    playerList,
  };
}

const enrichedGroups = groups.map(g => ({ ...g, ...calcGroup(g.members) }));
const maxWin = Math.max(...enrichedGroups.map(g => g.winProb));

function tierFor(w) {
  if (w >= 15) return { label: "Elite",         color: "#f5e642", bg: "#78350f" };
  if (w >= 8)  return { label: "Top Contender", color: "#4ade80", bg: "#14532d" };
  if (w >= 4)  return { label: "Strong",        color: "#60a5fa", bg: "#1e3a5f" };
  if (w >= 2)  return { label: "Value",         color: "#c084fc", bg: "#4a1d96" };
  if (w >= 1)  return { label: "Sleeper",       color: "#fb923c", bg: "#7c2d12" };
  return             { label: "Longshot",       color: "#9ca3af", bg: "#374151" };
}

              <span style={{ fontSize:11, padding:"3px 8px", borderRadius:8, fontWeight:700,

            </div>

          </div>

function scoreColor(val) {
  if (val === null || val === undefined || val === "E") return "#e8f5e9";
  if (typeof val === "string") {
    const n = parseInt(val);
    if (isNaN(n)) return "#e8f5e9";
    if (n < 0) return "#f87171";
    if (n > 0) return "#86efac";
    return "#e8f5e9";
  }
  if (val < 0) return "#f87171";
  if (val > 0) return "#86efac";
  return "#e8f5e9";
}

function fmtScore(val) {
  if (val === null || val === undefined) return "-";
  if (val === 0 || val === "E") return "E";
  if (typeof val === "number") return val > 0 ? "+" + val : String(val);
  return String(val);
}

function parseScore(str) {
  if (!str || str === "-" || str === "") return null;
  if (str === "E") return 0;
  const n = parseInt(str);
  return isNaN(n) ? null : n;
}

  const fetchScores = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      // ESPN Masters leaderboard API
      const res = await fetch(
        "https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard?event=401353338",
        { headers: { Accept: "application/json" } }
      );
      if (!res.ok) throw new Error("ESPN API returned " + res.status);
      const data = await res.json();

      const competitors = data?.events?.[0]?.competitions?.[0]?.competitors || [];
      const parsed = competitors.map(c => {
        const name = c.athlete?.displayName || c.athlete?.fullName || "";
        const rounds = (c.linescores || []).map(r => parseScore(r.displayValue));
        const totalScore = parseScore(c.score?.displayValue) ?? parseScore(c.statistics?.find(s => s.name === "totalScore")?.displayValue);
        const pos = c.status?.position?.displayName || c.status?.displayValue || "";
        const thru = c.status?.thru || c.status?.period || "";
        const teeTime = c.status?.teeTime || "";
        const status = c.status?.type?.name || "";
        return { name, rounds, totalScore, pos, thru, teeTime, status };
      });

      parsed.sort((a, b) => {
        if (a.totalScore === null && b.totalScore === null) return 0;
        if (a.totalScore === null) return 1;
        if (b.totalScore === null) return -1;
        return a.totalScore - b.totalScore;
      });

      setLeaderboard(parsed);
      setLastUpdated(new Date());

      setError("Live data unavailable yet — Masters tees off April 9. Scores will appear here automatically once play begins.");
    }

                      </div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 22, fontWeight: 900, color: tier }}>{g.bestScore !== null ? fmtScore(g.bestScore) : "-"}</div>
                      <div style={{ fontSize: 10, color: "#6a9a6a" }}>{g.bestPos ? ("T" + g.bestPos + " best") : "No data"}</div>
                      {estPayout > 0 && <div style={{ fontSize: 11, color: "#4ade80", fontWeight: 700 }}>{"~$" + estPayout.toLocaleString() + " est."}</div>}
                    </div>
                  </div>
                  <div style={{ borderTop: "1px solid #2d4a2d", paddingTop: 8 }}>
                    {g.players.length === 0 ? (
                      <div style={{ fontSize: 11, color: "#4a7a4a", fontStyle: "italic" }}>No players in leaderboard yet</div>
                    ) : (
                      g.players.sort((a, b) => (a.totalScore ?? 99) - (b.totalScore ?? 99)).map(p => (
                        <div key={p.name} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
                          <span style={{ fontSize: 11, color: "#6a9a6a", minWidth: 28 }}>{p.pos || ("T" + p.posNum)}</span>
                          <span style={{ fontSize: 13, fontWeight: 600, flex: 1 }}>{p.name}</span>
                          <div style={{ display: "flex", gap: 6 }}>
                            {[0, 1, 2, 3].map(ri => (
                              <span key={ri} style={{ fontSize: 11, color: scoreColor(p.rounds[ri]), minWidth: 28, textAlign: "center" }}>
                                {p.rounds[ri] !== null && p.rounds[ri] !== undefined ? fmtScore(p.rounds[ri]) : "-"}
                              </span>
                            ))}
                            <span style={{ fontSize: 13, fontWeight: 800, color: scoreColor(p.totalScore), minWidth: 36, textAlign: "right" }}>
                              {fmtScore(p.totalScore)}
                            </span>
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* OWNER STANDINGS */}
        {view === "owners" && (
          <div>
            <div style={{ background: "#162916", border: "1px solid #2d6a2d", borderRadius: 10, padding: 12, marginBottom: 14, fontSize: 12, color: "#8fbc8f" }}>
              Teams ranked by best overall player score across all their groups. Estimated payout based on best finishing position(s).
            </div>
            {ownerList.map((o, i) => {
              const tierColor = i === 0 ? "#f5e642" : i < 3 ? "#4ade80" : "#8fbc8f";
              const allPlayers = o.groups.flatMap(g => g.players).sort((a, b) => (a.totalScore ?? 99) - (b.totalScore ?? 99));
              const bestFinish = allPlayers[0];
              const estPayout = o.bestPos && o.bestPos <= 8 ? Math.round(POT * FINISH_PAYOUTS[o.bestPos - 1]) : 0;
              const totalSpent = o.groups.reduce((s, g) => s + g.sold, 0);
              return (
                <div key={o.owner} style={{ background: "#162916", border: "1px solid " + (i < 3 ? "#2d6a2d" : "#2d4a2d"), borderRadius: 12, padding: "14px 16px", marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontSize: 24, fontWeight: 900, color: tierColor, minWidth: 32 }}>{i + 1}</span>
                      <div>
                        <div style={{ fontWeight: 900, fontSize: 16, color: "#f5e642" }}>{o.owner}</div>
                        <div style={{ fontSize: 11, color: "#6a9a6a" }}>{"$" + totalSpent.toLocaleString() + " invested | " + o.groups.length + " groups"}</div>
                      </div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 26, fontWeight: 900, color: tierColor, lineHeight: 1 }}>{o.bestScore !== null ? fmtScore(o.bestScore) : "-"}</div>
                      <div style={{ fontSize: 10, color: "#6a9a6a" }}>{o.bestPos ? ("Best: T" + o.bestPos) : "No data"}</div>
                      {estPayout > 0 && <div style={{ fontSize: 13, color: "#4ade80", fontWeight: 800 }}>{"~$" + estPayout.toLocaleString() + " est."}</div>}
                    </div>
                  </div>

                  {/* Groups owned */}
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: bestFinish ? 10 : 0 }}>
                    {o.groups.map(g => (
                      <div key={g.group} style={{ background: "#0a160a", borderRadius: 8, padding: "5px 10px", fontSize: 11 }}>
                        <span style={{ color: "#8fbc8f", fontWeight: 700 }}>{g.group}</span>
                        <span style={{ color: "#f87171", marginLeft: 6 }}>{"$" + g.sold.toLocaleString()}</span>
                        {g.bestScore !== null && (
                          <span style={{ color: scoreColor(g.bestScore), marginLeft: 6, fontWeight: 800 }}>{fmtScore(g.bestScore)}</span>
                        )}
                      </div>
                    ))}
                  </div>

                  {/* Top players */}
                  {allPlayers.length > 0 && (
                    <div style={{ borderTop: "1px solid #2d4a2d", paddingTop: 8 }}>
                      <div style={{ fontSize: 10, color: "#6a9a6a", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.5 }}>Top Players</div>
                      {allPlayers.slice(0, 5).map(p => (
                        <div key={p.name} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                          <span style={{ fontSize: 11, color: "#6a9a6a", minWidth: 28 }}>{p.pos || ("T" + p.posNum)}</span>
                          <span style={{ fontSize: 13, fontWeight: 600, flex: 1 }}>{p.name}</span>
                          <span style={{ fontSize: 10, color: "#60a5fa", minWidth: 80 }}>{PLAYER_TO_GROUP[p.name]}</span>
                          <div style={{ display: "flex", gap: 6 }}>
                            {[0, 1, 2, 3].map(ri => (
                              <span key={ri} style={{ fontSize: 11, color: scoreColor(p.rounds[ri]), minWidth: 28, textAlign: "center" }}>
                                {p.rounds[ri] !== null && p.rounds[ri] !== undefined ? fmtScore(p.rounds[ri]) : "-"}
                              </span>
                            ))}
                            <span style={{ fontSize: 13, fontWeight: 800, color: scoreColor(p.totalScore), minWidth: 36, textAlign: "right" }}>
                              {fmtScore(p.totalScore)}
                            </span>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

      </div>

      <div style={{ textAlign: "center", padding: 12, borderTop: "1px solid #162916", fontSize: 10, color: "#3a5a3a" }}>
        Live data via ESPN API | Auto-refresh every 60s when enabled | 2026 Masters Tournament
      </div>
    </div>
  );
}



function App() {
  const [page, setPage] = React.useState("leaderboard");
  const navStyle = (p) => ({
    padding: "10px 22px", border: "none", cursor: "pointer", fontSize: 13, fontWeight: 700,
    background: page === p ? "#f5e642" : "transparent",
    color: page === p ? "#0a160a" : "#8fbc8f",
    borderBottom: page === p ? "3px solid #f5e642" : "3px solid transparent",
    transition: "all 0.2s",
  });
  return (
    React.createElement("div", { style: { fontFamily: "'Segoe UI', system-ui, sans-serif", background: "#0a160a", minHeight: "100vh" } },
      React.createElement("div", { style: { background: "#0d2010", borderBottom: "2px solid #2d4a2d", display: "flex", gap: 0 } },
        React.createElement("button", { onClick: () => setPage("leaderboard"), style: navStyle("leaderboard") }, "Live Leaderboard"),
        React.createElement("button", { onClick: () => setPage("auction"), style: navStyle("auction") }, "Auction Guide")
      ),
      page === "leaderboard" ? React.createElement(LeaderboardApp) : React.createElement(AuctionApp)
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

  </script>
</body>
</html>
